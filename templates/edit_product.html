{% extends "base.html" %}
{% block content %}
<h1>Edit Product</h1>
<form method="POST">
    <div class="form-group">
        <label>Product Name</label>
        <input type="text" name="name" value="{{ product.name }}" required>
    </div>
    <div class="form-group">
        <label>Category</label>
        <input type="text" name="category" value="{{ product.category }}" required>
    </div>
    <div class="form-group">
        <label>Price (₹)</label>
        <input type="number" name="price" step="0.01" min="0" value="{{ product.price }}" required>
    </div>
    <div class="form-group">
        <label>Quantity in Stock</label>
        <input type="number" name="quantity" min="0" value="{{ product.quantity }}" required>
    </div>
    <div class="form-group">
        <label>Low Stock Threshold</label>
        <input type="number" name="low_stock_threshold" min="0" value="{{ product.low_stock_threshold }}">
    </div>
    <button class="btn" type="submit">Save Changes</button>
    <a class="btn" style="background:#888" href="{{ url_for('index') }}">Cancel</a>
</form>
{% endblock %}
