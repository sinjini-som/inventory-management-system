{% extends "base.html" %}
{% block content %}
<h1>Place an Order</h1>
<form method="POST">
    <div class="form-group">
        <label>Product</label>
        <select name="product_id" required>
            {% for p in products %}
            <option value="{{ p.id }}">{{ p.name }} (In stock: {{ p.quantity }})</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label>Quantity to Order</label>
        <input type="number" name="quantity_ordered" min="1" required>
    </div>
    <button class="btn" type="submit">Place Order</button>
    <a class="btn" style="background:#888" href="{{ url_for('index') }}">Cancel</a>
</form>
{% endblock %}
